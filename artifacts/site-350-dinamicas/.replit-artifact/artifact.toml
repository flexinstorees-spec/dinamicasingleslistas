kind = "web"
previewPath = "/"
title = "350 Dinámicas de Inglés"
version = "1.0.0"
id = "artifacts/site-350-dinamicas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19006

[services.development]
run = "pnpm --filter @workspace/site-350-dinamicas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/site-350-dinamicas", "run", "build" ]
publicDir = "artifacts/site-350-dinamicas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19006"
BASE_PATH = "/"
